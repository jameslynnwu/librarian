              disabled.

              When in this mode, one or both of
              [SearchRequest.facet_specs][google.cloud.retail.v2.SearchRequest.facet_specs]
              and
              [SearchRequest.dynamic_facet_spec][google.cloud.retail.v2.SearchRequest.dynamic_facet_spec]
