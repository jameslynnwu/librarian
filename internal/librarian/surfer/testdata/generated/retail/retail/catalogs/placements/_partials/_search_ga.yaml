          - arg_value: disabled
            enum_value: DISABLED
            help_text: Disable personalization.
      - arg_name: labels
        api_field: searchRequest.labels
        help_text: |-
          The labels applied to a resource must meet the following requirements:

          * Each resource can have multiple labels, up to a maximum of 64.
          * Each label must be a key-value pair.
          * Keys have a minimum length of 1 character and a maximum length of 63
            characters and cannot be empty. Values can be empty and have a maximum
            length of 63 characters.
          * Keys and values can contain only lowercase letters, numeric characters,
            underscores, and dashes. All characters must use UTF-8 encoding, and
            international characters are allowed.
          * The key portion of a label must be unique. However, you can use the same
            key with multiple resources.
          * Keys must start with a lowercase letter or international character.

          For more information, see [Requirements for
          labels](https://cloud.google.com/resource-manager/docs/creating-managing-labels#requirements)
          in the Resource Manager documentation.
        is_positional: false
        required: false
        repeated: true
        spec:
          - api_field: key
          - api_field: value
      - arg_name: spell-correction-spec-mode
        api_field: searchRequest.spellCorrectionSpec.mode
        help_text: |-
          The mode under which spell correction should take effect to
          replace the original search query. Default to
          [Mode.AUTO][google.cloud.retail.v2.SearchRequest.SpellCorrectionSpec.Mode.AUTO].
        is_positional: false
        required: false
        choices:
          - arg_value: suggestion-only
            enum_value: SUGGESTION_ONLY
            help_text: |-
              Google Retail Search will try to find a spell suggestion if there
              is any and put in the
              [SearchResponse.corrected_query][google.cloud.retail.v2.SearchResponse.corrected_query].
              The spell suggestion will not be used as the search query.
          - arg_value: auto
            enum_value: AUTO
            help_text: |-
              Automatic spell correction built by Google Retail Search. Search will
              be based on the corrected query if found.
      - arg_name: entity
        api_field: searchRequest.entity
        help_text: |-
          The entity for customers that may run multiple different entities, domains,
          sites or regions, for example, `Google US`, `Google Ads`, `Waymo`,
          `google.com`, `youtube.com`, etc.
          If this is set, it should be exactly matched with
