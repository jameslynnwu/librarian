        is_positional: false
        required: true
      - arg_name: user-event-event-type
        api_field: predictRequest.userEvent.eventType
        help_text: |-
          User event type. Allowed values are:

          * `add-to-cart`: Products being added to cart.
          * `remove-from-cart`: Products being removed from cart.
          * `category-page-view`: Special pages such as sale or promotion pages
            viewed.
          * `detail-page-view`: Products detail page viewed.
          * `home-page-view`: Homepage viewed.
          * `purchase-complete`: User finishing a purchase.
          * `search`: Product search.
          * `shopping-cart-page-view`: User viewing a shopping cart.
        is_positional: false
        required: true
      - arg_name: user-event-visitor-id
        api_field: predictRequest.userEvent.visitorId
        help_text: |-
          A unique identifier for tracking visitors.

          For example, this could be implemented with an HTTP cookie, which should be
          able to uniquely identify a visitor on a single device. This unique
          identifier should not change if the visitor log in/out of the website.

          Don't set the field to the same fixed ID for different users. This mixes
          the event history of those users together, which results in degraded model
          quality.

          The field must be a UTF-8 encoded string with a length limit of 128
          characters. Otherwise, an INVALID_ARGUMENT error is returned.

          The field should not contain PII or user-data. We recommend to use Google
          Analytics [Client
          ID](https://developers.google.com/analytics/devguides/collection/analyticsjs/field-reference#clientId)
          for this field.
        is_positional: false
        required: true
      - arg_name: user-event-session-id
        api_field: predictRequest.userEvent.sessionId
        help_text: |-
          A unique identifier for tracking a visitor session with a length limit of
          128 bytes. A session is an aggregation of an end user behavior in a time
          span.

          A general guideline to populate the session_id:
          1. If user has no activity for 30 min, a new session_id should be assigned.
          2. The session_id should be unique across users, suggest use uuid or add
          visitor_id as prefix.
        is_positional: false
        required: false
      - arg_name: user-event-event-time
        api_field: predictRequest.userEvent.eventTime
        help_text: |-
