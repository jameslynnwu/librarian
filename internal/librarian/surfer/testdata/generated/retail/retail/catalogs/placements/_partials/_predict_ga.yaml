      - arg_name: user-event-experiment-ids
        api_field: predictRequest.userEvent.experimentIds
        help_text: |-
          A list of identifiers for the independent experiment groups this user event
          belongs to. This is used to distinguish between user events associated with
          different experiment setups (e.g. using Retail API, using different
          recommendation models).
        is_positional: false
        required: false
        repeated: true
      - arg_name: user-event-attribution-token
        api_field: predictRequest.userEvent.attributionToken
        help_text: |-
          Highly recommended for user events that are the result of
          [PredictionService.Predict][google.cloud.retail.v2.PredictionService.Predict].
          This field enables accurate attribution of recommendation model
          performance.

          The value must be a valid
          [PredictResponse.attribution_token][google.cloud.retail.v2.PredictResponse.attribution_token]
          for user events that are the result of
          [PredictionService.Predict][google.cloud.retail.v2.PredictionService.Predict].
          The value must be a valid
          [SearchResponse.attribution_token][google.cloud.retail.v2.SearchResponse.attribution_token]
          for user events that are the result of
          [SearchService.Search][google.cloud.retail.v2.SearchService.Search].

          This token enables us to accurately attribute page view or purchase back to
          the event and the particular predict response containing this
          clicked/purchased product. If user clicks on product K in the
          recommendation results, pass
          [PredictResponse.attribution_token][google.cloud.retail.v2.PredictResponse.attribution_token]
          as a URL parameter to product K's page. When recording events on product
          K's page, log the
          [PredictResponse.attribution_token][google.cloud.retail.v2.PredictResponse.attribution_token]
          to this field.
        is_positional: false
        required: false
      - arg_name: user-event-product-details
        api_field: predictRequest.userEvent.productDetails
        help_text: |-
          The main product details related to the event.

          This field is optional except for the following event types:

          * `add-to-cart`
          * `detail-page-view`
          * `purchase-complete`

          In a `search` event, this field represents the products returned to the end
          user on the current page (the end user may have not finished browsing the
          whole page yet). When a new page is returned to the end user, after
          pagination/filtering/ordering even for the same query, a new `search` event
